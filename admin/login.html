<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloakNet Admin - Вход</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg-primary:#0c0c0e;--bg-secondary:#141417;--bg-tertiary:#1c1c21;--bg-card:#1e1e24;--accent:#22d3ee;--text-primary:#f4f4f5;--text-secondary:#a1a1aa;--border:#27272a;--radius:10px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:32px;width:100%;max-width:400px}
        .logo{text-align:center;margin-bottom:24px}
        .logo-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),#06b6d4);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px}
        .logo-text{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--accent),#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        h1{text-align:center;font-size:20px;margin-bottom:24px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;color:var(--text-secondary);font-size:13px;margin-bottom:6px}
        .form-group input{width:100%;padding:12px 14px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:14px;font-family:inherit}
        .form-group input:focus{outline:none;border-color:var(--accent)}
        .btn{width:100%;padding:14px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s}
        .btn-primary{background:var(--accent);color:#000}
        .btn-primary:hover{background:#67e8f9}
        .btn-telegram{background:#229ED9;color:#fff;margin-top:12px}
        .btn-telegram:hover{background:#1a8bc4}
        .divider{text-align:center;margin:20px 0;color:var(--text-secondary);font-size:13px}
        .error{background:rgba(248,113,113,0.15);color:#f87171;padding:12px;border-radius:var(--radius);margin-bottom:16px;font-size:14px;display:none}
        .error.show{display:block}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">🛡️</div>
            <div class="logo-text">CloakNet</div>
        </div>
        <h1>Вход в админ-панель</h1>
        <div class="error" id="error"></div>
        <div class="form-group">
            <label>Логин</label>
            <input type="text" id="username" placeholder="admin">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="login()">Войти</button>
        <div class="divider">или</div>
        <button class="btn btn-telegram" onclick="loginTelegram()">Войти через Telegram</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showError('Заполните все поля');
                return;
            }
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_user', data.username);
                    window.location.href = '/admin';
                } else {
                    showError(data.error || 'Ошибка входа');
                }
            } catch(e) {
                showError('Ошибка соединения');
            }
        }
        
        async function loginTelegram() {
            const tgUser = tg.initDataUnsafe?.user;
            
            if (!tgUser?.id) {
                // Открыть бота для авторизации
                window.location.href = 'https://t.me/cloaknetvbot?start=admin_login';
                return;
            }
            
            const telegramId = tgUser.id;
            const initData = tg.initData || '';
            
            try {
                const res = await fetch(`/api/admin/auth?telegram_id=${telegramId}&init_data=${encodeURIComponent(initData)}`);
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_user', 'telegram');
                    window.location.href = '/admin';
                } else {
                    showError(data.error || 'Доступ запрещён');
                }
            } catch(e) {
                showError('Ошибка соединения');
            }
        }
        
        // Проверить если уже вошёл
        if (localStorage.getItem('admin_token')) {
            window.location.href = '/admin';
        }
    </script>
</body>
</html>
